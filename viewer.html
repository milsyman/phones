<!DOCTYPE html>
<html>
<head>
  <title>Live Tracker Viewer</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "phone-b3f5d.firebaseapp.com",
  databaseURL: "https://phone-b3f5d-default-rtdb.firebaseio.com/",
  projectId: "phone-b3f5d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map').setView([0, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let markers = {};

// Listen for all tracked users
db.ref("locations").on("value", (snapshot) => {
  const users = snapshot.val();
  if (!users) return;

  for (let id in users) {
    const data = users[id];

    if (!markers[id]) {
      markers[id] = L.marker([data.lat, data.lng]).addTo(map);
    } else {
      markers[id].setLatLng([data.lat, data.lng]);
    }

    const time = new Date(data.timestamp).toLocaleTimeString();

    markers[id].bindPopup(`
      <b>${id}</b><br>
      📍 ${data.address}<br>
      🕒 Last seen: ${time}
    `);
  }
});
</script>

</body>
</html>
