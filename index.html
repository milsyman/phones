<!DOCTYPE html>
<html>
<head>
  <title>Phone Location Tracker</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script>
  // 🔥 Replace with your Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBBWe8UJ4G4toMHMnbHKGz9BnyIzNlBY5A",
  authDomain: "phone-b3f5d.firebaseapp.com",
  projectId: "phone-b3f5d",
  storageBucket: "phone-b3f5d.firebasestorage.app",
  messagingSenderId: "215137856881",
  appId: "1:215137856881:web:3a50dc5ba8a0c925b5dad0",
  measurementId: "G-3D294YBS3C"
};

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // 🌍 Initialize map
  const map = L.map('map').setView([0, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
  }).addTo(map);

  let marker;

  // 📍 Get phone location
  function trackLocation() {
    if (navigator.geolocation) {
      navigator.geolocation.watchPosition((position) => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        // Save to Firebase
        db.ref('locations/user1').set({
          lat: lat,
          lng: lng,
          timestamp: Date.now()
        });

        updateMap(lat, lng);
      });
    } else {
      alert("Geolocation not supported");
    }
  }

  // 🗺️ Update map
  function updateMap(lat, lng) {
    if (!marker) {
      marker = L.marker([lat, lng]).addTo(map);
    } else {
      marker.setLatLng([lat, lng]);
    }

    map.setView([lat, lng], 15);
  }

  // 👀 Listen for real-time updates
  db.ref('locations/user1').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
      updateMap(data.lat, data.lng);
    }
  });

  // Start tracking
  trackLocation();
</script>

</body>
</html>
